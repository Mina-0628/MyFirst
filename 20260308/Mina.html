<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <!--這裡是註解.快捷鍵Ctrl+?-->
    <!--給瀏覽器的資訊網站標題、描述、關鍵字、作者等..不會顯示在網站.但對ESO有幫助 -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWD課堂筆記</title>
</head>

<body>
    <!-- 主體內容 -->
    <!--給使用者看的內容.文字圖片影片等..會顯示在網站上. -->
    <p>hello word</p>
    <a href="http://google.com">google</a>
    <!--是新開視窗-->
    <a href="http://google.com" target="_blank">google</a> >
    <!--快捷鍵:Shift+Alt+⬆或⬇-->



</body>

</html>
