<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <!--這裡是註解.快捷鍵Ctrl+?-->
    <!--給瀏覽器的資訊網站標題、描述、關鍵字、作者等..不會顯示在網站.但對ESO有幫助 -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWD課堂筆記</title>
</head>

<body>
    <!-- 主體內容 -->
    <!--給使用者看的內容.文字圖片影片等..會顯示在網站上. -->
    <p>hello word</p>
    <a href="http://google.com">google 網站</a>
    <!--是新開視窗-->

    <a href="http://google.com" target="_blank">google 網站</a>
    <!--快捷鍵:Shift+Alt+⬆或⬇-->
    <!--href是導向-超連結的屬性.可以連結到其他網站或同一網站的其他頁面. -->
    <hr> <!--水平線-->
    <img src="https://picsum.photos/300/200/?random=10">
    <img src="../media/rabbit.jfif">
    <!--picsum新增一個虛假圖片-->
    <!--./點斜線是相對路徑-->
    <!--兩個的點點是上一層-->
    <img src="../media/rabbit1.jpg" width="20%" alt="5支兔兔" title="跳跳跳">
    <!--width是寬度的屬性.可以用px或%來設定圖片的大小. -->
    <!--alt是替代文字的屬性.當圖片無法顯示時會顯示這段文字.對SEO也有幫助. -->
    <!--title是提示文字的屬性.當滑鼠移到圖片上時會顯示這段文字. -->

    <hr>
    <!--除圖片之外，某些元素也會使用相對路徑，例如連結 -->
    <a href="./index.html">回首頁</a>


</html>
